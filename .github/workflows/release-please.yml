name: Release Please

on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Publishing lives here rather than in publish.yml: releases created by
  # release-please carry the default GITHUB_TOKEN, and GitHub does not start
  # workflow runs from `release` events raised by that token.
  pypi:
    name: Publish ${{ matrix.path }}
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    # Must match the "Environment name" on both PyPI trusted publishers.
    environment: pypi
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        path: ${{ fromJson(needs.release-please.outputs.paths_released) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build "${{ matrix.path }}" --outdir dist
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
