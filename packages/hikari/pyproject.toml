[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mochi-analytics-hikari"
version = "0.2.0"
description = "hikari adapter for Mochi - auto-instruments commands, guild joins/leaves, and health snapshots"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
keywords = ["discord", "hikari", "bot", "analytics", "mochi"]
authors = [{ name = "Mochi Analytics", email = "contact@bwmp.dev" }]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: Apache Software License",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
]
dependencies = [
    "mochi-analytics>=1.0.0",
    "hikari>=2.0.0",
]

[project.urls]
Homepage = "https://github.com/mochi-analytics/mochi-py"
Repository = "https://github.com/mochi-analytics/mochi-py"
"Bug Tracker" = "https://github.com/mochi-analytics/mochi-py/issues"

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-asyncio>=0.23"]

[tool.hatch.build.targets.wheel]
packages = ["src/mochi_analytics_hikari"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
